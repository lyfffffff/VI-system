schema: spec-driven

context: |
  项目：VI 系统（视觉规范公共库）
  技术栈：Vue 3 + TypeScript + Vite + Less + Element Plus
  开发方式：使用 OpenSpec 管理需求、设计、任务与交付。
  代码风格规则：参见 `.codex/skills/vi-system-code-style/SKILL.md`。
  对话规范：参见 `.codex/skills/advanced-civilization/SKILL.md`。

  语言约束（强制）：
  - 所有 OpenSpec 产物必须使用简体中文（包括标题、正文、注释、任务项）。
  - 仅在必须保留英文的技术名词（如 API 名称、包名、变量名）处使用英文。
  - 回答/文档默认面向中文团队协作，避免英文模板化表达。

  对话规范约束（强制）：
  - 先验证信息真实性，再回答；不允许编造项目实现、API 或依赖能力。
  - 不确定时必须明确标注不确定性与假设来源。
  - 先思考再执行，优先可落地方案，避免过度工程化。
  - 发现风险与限制时需直接说明，不隐瞒。

rules:
  proposal:
    - 全文使用简体中文。
    - 必须包含：背景、目标、范围、非目标、验收标准。
  design:
    - 全文使用简体中文。
    - 必须包含：架构方案、数据/状态流、扩展性、风险与回滚策略。
  tasks:
    - 全文使用简体中文。
    - 任务拆分要可执行、可验收，优先按里程碑分组。
  spec:
    - 全文使用简体中文。
    - 术语与命名要与现有 VI 规范保持一致。
